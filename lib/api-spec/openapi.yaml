openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Light Speed Ghost API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: writing
    description: AI paper writing operations
  - name: revision
    description: Paper revision operations
  - name: plagiarism
    description: AI and plagiarism checking operations
  - name: stem
    description: STEM problem solving operations
  - name: study
    description: AI study assistant operations
  - name: documents
    description: User document management

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /documents:
    get:
      operationId: listDocuments
      tags: [documents]
      summary: List user documents
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [paper, revision, stem, study]
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: List of documents
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentList"
    post:
      operationId: createDocument
      tags: [documents]
      summary: Create a new document
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDocumentBody"
      responses:
        "201":
          description: Document created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"

  /documents/{id}:
    get:
      operationId: getDocument
      tags: [documents]
      summary: Get a document by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Document found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"
        "404":
          description: Not found
    put:
      operationId: updateDocument
      tags: [documents]
      summary: Update a document
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDocumentBody"
      responses:
        "200":
          description: Document updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"
    delete:
      operationId: deleteDocument
      tags: [documents]
      summary: Delete a document
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /documents/stats:
    get:
      operationId: getDocumentStats
      tags: [documents]
      summary: Get document statistics for dashboard
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentStats"

  /writing/generate:
    post:
      operationId: generatePaper
      tags: [writing]
      summary: Generate a new academic paper with citations
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GeneratePaperBody"
      responses:
        "200":
          description: Generated paper content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneratedPaper"

  /writing/outline:
    post:
      operationId: generateOutline
      tags: [writing]
      summary: Generate a paper outline
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateOutlineBody"
      responses:
        "200":
          description: Generated outline
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneratedOutline"

  /revision/submit:
    post:
      operationId: submitRevision
      tags: [revision]
      summary: Submit a paper for AI revision
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RevisionSubmitBody"
      responses:
        "200":
          description: Revision result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RevisionResult"

  /plagiarism/check:
    post:
      operationId: checkPlagiarism
      tags: [plagiarism]
      summary: Check text for AI content and plagiarism
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlagiarismCheckBody"
      responses:
        "200":
          description: Check result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlagiarismResult"

  /plagiarism/humanize:
    post:
      operationId: humanizeText
      tags: [plagiarism]
      summary: Humanize AI-detected text
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HumanizeBody"
      responses:
        "200":
          description: Humanized text
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HumanizeResult"

  /stem/solve:
    post:
      operationId: solveStem
      tags: [stem]
      summary: Solve a STEM problem with step-by-step solution
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StemSolveBody"
      responses:
        "200":
          description: Solution result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StemSolution"

  /stem/subjects:
    get:
      operationId: getStemSubjects
      tags: [stem]
      summary: Get available STEM subject categories
      responses:
        "200":
          description: List of STEM subjects
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StemSubjectList"

  /study/ask:
    post:
      operationId: askStudyAssistant
      tags: [study]
      summary: Ask the AI study assistant a question
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StudyAskBody"
      responses:
        "200":
          description: Assistant response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudyResponse"

  /study/sessions:
    get:
      operationId: listStudySessions
      tags: [study]
      summary: List study sessions
      responses:
        "200":
          description: Study sessions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudySessionList"

  /study/sessions/{id}/messages:
    get:
      operationId: getSessionMessages
      tags: [study]
      summary: Get messages for a study session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudyMessageList"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    Document:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        content:
          type: string
        type:
          type: string
          enum: [paper, revision, stem, study]
        subject:
          type: string
        wordCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, title, content, type, createdAt, updatedAt]

    DocumentList:
      type: object
      properties:
        documents:
          type: array
          items:
            $ref: "#/components/schemas/Document"
        total:
          type: integer
      required: [documents, total]

    CreateDocumentBody:
      type: object
      properties:
        title:
          type: string
        content:
          type: string
        type:
          type: string
          enum: [paper, revision, stem, study]
        subject:
          type: string
      required: [title, content, type]

    UpdateDocumentBody:
      type: object
      properties:
        title:
          type: string
        content:
          type: string
        subject:
          type: string

    DocumentStats:
      type: object
      properties:
        totalDocuments:
          type: integer
        papersWritten:
          type: integer
        revisionsCompleted:
          type: integer
        stemSolved:
          type: integer
        studySessions:
          type: integer
        recentDocuments:
          type: array
          items:
            $ref: "#/components/schemas/Document"
      required: [totalDocuments, papersWritten, revisionsCompleted, stemSolved, studySessions, recentDocuments]

    GeneratePaperBody:
      type: object
      properties:
        topic:
          type: string
        subject:
          type: string
        paperType:
          type: string
          enum: [research, essay, thesis, literature_review, report]
        length:
          type: string
          enum: [short, medium, long]
        citationStyle:
          type: string
          enum: [apa, mla, chicago, harvard, ieee]
        additionalInstructions:
          type: string
        isStem:
          type: boolean
      required: [topic, subject, paperType, length, citationStyle]

    GeneratedPaper:
      type: object
      properties:
        title:
          type: string
        content:
          type: string
        citations:
          type: array
          items:
            $ref: "#/components/schemas/Citation"
        bibliography:
          type: string
        wordCount:
          type: integer
        documentId:
          type: integer
      required: [title, content, citations, bibliography, wordCount]

    Citation:
      type: object
      properties:
        id:
          type: string
        authors:
          type: string
        title:
          type: string
        year:
          type: integer
        source:
          type: string
        url:
          type: string
        formatted:
          type: string
      required: [id, authors, title, year, source, formatted]

    GenerateOutlineBody:
      type: object
      properties:
        topic:
          type: string
        subject:
          type: string
        paperType:
          type: string
          enum: [research, essay, thesis, literature_review, report]
      required: [topic, subject, paperType]

    GeneratedOutline:
      type: object
      properties:
        title:
          type: string
        sections:
          type: array
          items:
            type: object
            properties:
              heading:
                type: string
              subsections:
                type: array
                items:
                  type: string
            required: [heading]
      required: [title, sections]

    RevisionSubmitBody:
      type: object
      properties:
        originalText:
          type: string
        instructions:
          type: string
        marksScored:
          type: string
        gradingCriteria:
          type: string
        targetGrade:
          type: string
      required: [originalText, instructions]

    RevisionResult:
      type: object
      properties:
        revisedText:
          type: string
        changes:
          type: array
          items:
            type: object
            properties:
              section:
                type: string
              original:
                type: string
              revised:
                type: string
              reason:
                type: string
            required: [section, original, revised, reason]
        feedback:
          type: string
        gradeEstimate:
          type: string
        documentId:
          type: integer
      required: [revisedText, changes, feedback]

    PlagiarismCheckBody:
      type: object
      properties:
        text:
          type: string
        checkAi:
          type: boolean
          default: true
        checkPlagiarism:
          type: boolean
          default: true
      required: [text]

    PlagiarismResult:
      type: object
      properties:
        aiScore:
          type: number
          description: Percentage of text detected as AI-generated (0-100)
        plagiarismScore:
          type: number
          description: Percentage of text detected as plagiarized (0-100)
        aiSections:
          type: array
          items:
            type: object
            properties:
              text:
                type: string
              score:
                type: number
              startIndex:
                type: integer
              endIndex:
                type: integer
            required: [text, score, startIndex, endIndex]
        plagiarismSources:
          type: array
          items:
            type: object
            properties:
              url:
                type: string
              similarity:
                type: number
              matchedText:
                type: string
            required: [url, similarity, matchedText]
        overallRisk:
          type: string
          enum: [low, medium, high]
      required: [aiScore, plagiarismScore, aiSections, plagiarismSources, overallRisk]

    HumanizeBody:
      type: object
      properties:
        text:
          type: string
        intensity:
          type: string
          enum: [light, medium, heavy]
          default: medium
      required: [text]

    HumanizeResult:
      type: object
      properties:
        humanizedText:
          type: string
        changes:
          type: integer
          description: Number of changes made
        beforeScore:
          type: number
        afterScore:
          type: number
      required: [humanizedText, changes]

    StemSolveBody:
      type: object
      properties:
        problem:
          type: string
        subject:
          type: string
          enum: [mathematics, physics, chemistry, biology, engineering, computer_science, statistics]
        showSteps:
          type: boolean
          default: true
        generateGraph:
          type: boolean
          default: false
        exportFormat:
          type: string
          enum: [text, latex, json, csv]
          default: text
      required: [problem, subject]

    StemSolution:
      type: object
      properties:
        answer:
          type: string
        steps:
          type: array
          items:
            type: object
            properties:
              stepNumber:
                type: integer
              description:
                type: string
              expression:
                type: string
              explanation:
                type: string
            required: [stepNumber, description, explanation]
        graphData:
          type: object
          nullable: true
          properties:
            type:
              type: string
              enum: [line, bar, scatter, function]
            data:
              type: array
              items:
                type: object
            labels:
              type: object
        latex:
          type: string
          nullable: true
        subject:
          type: string
        confidence:
          type: number
        documentId:
          type: integer
        corrections:
          type: array
          items:
            type: string
        passedVerification:
          type: boolean
      required: [answer, steps, subject, confidence]

    StemSubjectList:
      type: object
      properties:
        subjects:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              name:
                type: string
              description:
                type: string
              icon:
                type: string
            required: [id, name, description]
      required: [subjects]

    StudyAskBody:
      type: object
      properties:
        question:
          type: string
        sessionId:
          type: integer
        imageUrl:
          type: string
          nullable: true
        documentContext:
          type: string
          nullable: true
        mode:
          type: string
          enum: [tutor, explain, quiz, summarize]
          default: tutor
      required: [question]

    StudyResponse:
      type: object
      properties:
        answer:
          type: string
        followUpQuestions:
          type: array
          items:
            type: string
        sessionId:
          type: integer
        messageId:
          type: integer
        relatedConcepts:
          type: array
          items:
            type: string
      required: [answer, followUpQuestions, sessionId, messageId]

    StudySessionList:
      type: object
      properties:
        sessions:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              title:
                type: string
              subject:
                type: string
              messageCount:
                type: integer
              lastActivity:
                type: string
                format: date-time
              createdAt:
                type: string
                format: date-time
            required: [id, title, messageCount, lastActivity, createdAt]
      required: [sessions]

    StudyMessageList:
      type: object
      properties:
        messages:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              role:
                type: string
                enum: [user, assistant]
              content:
                type: string
              createdAt:
                type: string
                format: date-time
            required: [id, role, content, createdAt]
      required: [messages]
