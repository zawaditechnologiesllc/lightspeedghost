<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0d1f5c"/>
      <stop offset="1" stop-color="#1a3a9f"/>
    </linearGradient>
    <linearGradient id="bolt" x1="256" y1="72" x2="256" y2="440" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff"/>
      <stop offset="1" stop-color="#60a5fa"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background with rounded corners -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Lightning bolt — classic zigzag -->
  <path
    d="M296 72 L168 284 L232 284 L216 440 L344 228 L280 228 Z"
    fill="url(#bolt)"
    filter="url(#glow)"
  />
</svg>
