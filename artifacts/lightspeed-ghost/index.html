<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />

    <!-- Primary SEO -->
    <title>Light Speed Ghost — AI Academic Writing Assistant for Students</title>
    <meta name="description" content="Write full papers with real citations, revise drafts to hit your target grade, detect AI & plagiarism, solve STEM problems step-by-step, and get 24/7 AI tutoring. Free to start. No card required." />
    <meta name="keywords" content="AI paper writer, academic writing assistant, plagiarism checker, AI essay writer, STEM solver, APA citation generator, MLA essay writer, homework helper, paper revision, academic tutor, student writing tool, essay generator, college writing AI" />
    <meta name="author" content="Light Speed Ghost" />
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />
    <meta name="theme-color" content="#0d1f5c" />
    <link rel="canonical" href="https://lightspeedghost.com" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!-- Open Graph / Facebook / LinkedIn -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://lightspeedghost.com" />
    <meta property="og:site_name" content="Light Speed Ghost" />
    <meta property="og:title" content="Light Speed Ghost — AI Academic Writing Assistant for Students" />
    <meta property="og:description" content="Write papers with real citations, revise drafts, check for plagiarism and AI, solve STEM step-by-step, and get personalized tutoring. Six tools. One platform. Free to start." />
    <meta property="og:image" content="https://lightspeedghost.com/opengraph.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter / X Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@lightspeedghost" />
    <meta name="twitter:title" content="Light Speed Ghost — AI Academic Writing Assistant" />
    <meta name="twitter:description" content="Write papers, check plagiarism, solve STEM problems step-by-step. The academic writing platform that actually works. Free to start." />
    <meta name="twitter:image" content="https://lightspeedghost.com/opengraph.jpg" />

    <!-- Structured Data: SoftwareApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Light Speed Ghost",
      "url": "https://lightspeedghost.com",
      "logo": "https://lightspeedghost.com/favicon.svg",
      "applicationCategory": "EducationalApplication",
      "operatingSystem": "Web",
      "description": "AI-powered academic writing platform for students. Features include AI paper writing with real citations, paper revision, AI and plagiarism detection with humanization, STEM step-by-step solver, outline builder, and an AI study assistant.",
      "offers": [
        {
          "@type": "Offer",
          "name": "Free Plan",
          "price": "0",
          "priceCurrency": "USD",
          "description": "3 paper generations per month, unlimited plagiarism checks, full STEM solver, unlimited study assistant sessions"
        },
        {
          "@type": "Offer",
          "name": "Pro Plan",
          "price": "12",
          "priceCurrency": "USD",
          "description": "Unlimited paper generation, unlimited revisions, priority AI, full humanization suite, 90-day document history"
        },
        {
          "@type": "Offer",
          "name": "Team Plan",
          "price": "8",
          "priceCurrency": "USD",
          "description": "Everything in Pro for 5-50 users, shared document library, usage dashboard"
        }
      ],
      "featureList": [
        "AI academic paper writing with real Semantic Scholar citations",
        "APA, MLA, Chicago, Harvard, IEEE citation styles",
        "AI and plagiarism detection",
        "AI content humanization",
        "Paper revision with grade targeting",
        "STEM problem solver with step-by-step solutions",
        "Photo upload with OCR for STEM homework",
        "Outline builder",
        "AI study assistant with session memory",
        "File upload for PDF, DOCX, and image files"
      ],
      "screenshot": "https://lightspeedghost.com/opengraph.jpg",
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.8",
        "ratingCount": "1240"
      }
    }
    </script>

    <!-- Structured Data: FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Is Light Speed Ghost safe to use for academic work?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Light Speed Ghost is a writing aid in the same category as Grammarly, tutoring, or study groups. We don't store or share your work. Always review generated content and make it genuinely yours before submitting."
          }
        },
        {
          "@type": "Question",
          "name": "How good is the AI paper writing quality?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Light Speed Ghost pulls real academic sources from Semantic Scholar and uses subject-specific prompting — not generic AI writing. It generates solid drafts with working citations that you can build from, not placeholder text."
          }
        },
        {
          "@type": "Question",
          "name": "Does file upload work with university PDFs?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. PDF, Word documents, plain text files, and images are all supported. You can also photograph a physical problem sheet and our OCR extracts the text automatically."
          }
        },
        {
          "@type": "Question",
          "name": "What citation styles does Light Speed Ghost support?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "APA 7th edition, MLA 9th edition, Chicago, Harvard, and IEEE are all supported. The style is auto-detected when you upload an assignment brief."
          }
        },
        {
          "@type": "Question",
          "name": "Is there a free plan?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. The free plan includes 3 paper generations per month, unlimited plagiarism checks, full STEM solver access, and unlimited study assistant sessions. No credit card required."
          }
        },
        {
          "@type": "Question",
          "name": "What STEM subjects does the solver support?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Mathematics, Physics, Chemistry, Biology, Computer Science, and more. You can type a problem, paste text, or photograph your homework sheet for OCR extraction."
          }
        }
      ]
    }
    </script>

    <!-- Structured Data: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Light Speed Ghost",
      "url": "https://lightspeedghost.com",
      "logo": "https://lightspeedghost.com/favicon.svg",
      "description": "AI-powered academic writing tools for students.",
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer support",
        "url": "https://lightspeedghost.com"
      }
    }
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
